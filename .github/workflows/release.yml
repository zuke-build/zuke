name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

# Default to no permissions; each job opts into exactly what it needs.
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # release-please maintains the release PR and cuts GitHub releases/tags.
  # It needs to write repo contents and PRs, but must NOT hold the JSR OIDC
  # token — that lives only in the separate `publish` job below.
  release:
    name: Maintain releases (release-please)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # The ./zuke launcher bootstraps a pinned Deno version (override with
      # DENO_VERSION); no separate setup-deno step.
      - name: Run release-please with Zuke
        run: ./zuke release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to JSR via OIDC. This is the only job with `id-token: write`, and it
  # gets no GITHUB_TOKEN and only read access to contents — so the publishing
  # credential is isolated from the release-please write scopes. `publishJsr`
  # is idempotent (it skips versions already on JSR), so it is a safe no-op when
  # a push didn't actually release anything.
  publish:
    name: Publish to JSR
    needs: release
    runs-on: ubuntu-latest
    # Backstop: `publishJsr` already times out a stalled `deno publish` per
    # package; this caps the whole job in case anything else hangs.
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # The ./zuke launcher bootstraps a pinned Deno version (override with
      # DENO_VERSION); no separate setup-deno step.
      - name: Publish new versions to JSR with Zuke
        run: ./zuke publishJsr
