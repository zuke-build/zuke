name: CI

on:
  # Run once per change: `pull_request` covers every PR branch, and `push`
  # covers the post-merge commit on the default branch. Triggering `push` on
  # all branches as well would double every PR run (a `push` and a
  # `pull_request` job for the same commit) for no extra signal.
  push:
    branches: [master]
  pull_request:

# Default to read-only; the quality job opts into pull-requests:write below for
# the lint self-healing comment. The cross-OS test job stays secret-free.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build & verify with Zuke
    runs-on: ubuntu-latest
    # The lint self-healing fixer auto-applies the fix and pushes it to the PR
    # branch, so this job needs `contents: write` (the push) and
    # `pull-requests: write` (the comment). The OpenAI key is a same-repo secret,
    # so on fork PRs it is absent and the token is read-only — the fixer skips
    # and CI runs without writing anything.
    permissions:
      contents: write
      pull-requests: write
    steps:
      # This job carries live secrets (OPENAI_API_KEY) and a write-scoped token
      # while it executes build code, so block egress to everything except the
      # hosts the build legitimately needs. Even if untrusted code in `./zuke ci`
      # reads a token from the environment, it cannot POST it to an attacker host
      # — the connection is dropped. The allowlist is derived from the source:
      # Deno bootstrap (deno.land + the release CDN), module resolution (jsr.io
      # and registry.npmjs.org for the npm: cspell tooling), the OpenAI API
      # (provider.ts), and the GitHub API / git push for the
      # fixer's comment and commit. Add a host here if a run reports it blocked.
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            deno.land:443
            dl.deno.land:443
            jsr.io:443
            registry.npmjs.org:443
            api.openai.com:443
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443

      # persist-credentials keeps the token in git config so the lint fixer can
      # push its commit. For a same-repo PR, check out the head branch (not the
      # detached merge ref) so the push targets it; for a fork PR (or a push),
      # fall back to the default checkout — the fixer can't and won't push there.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
          ref: ${{ (github.event.pull_request.head.repo.full_name == github.repository) && github.head_ref || '' }}

      # No "set up Deno" step: the ./zuke launcher bootstraps Deno, pinned to a
      # known version by default (override with DENO_VERSION). Running through
      # the launcher keeps CI exercising the same entry point everyone else uses.
      #
      # OPENAI_API_KEY powers the lint target's self-healing fixer: on a lint
      # failure it fixes the file, commits and pushes to the PR branch, and posts
      # an overview comment of what it changed. The key is optional — without it
      # the fixer skips and lint just fails. The fixer fetches the PR base branch
      # itself for diff context (no manual step).
      - name: Run the full gate with Zuke
        run: ./zuke ci
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-os:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # This job deliberately exercises the user-facing bootstrap launchers
      # (the value here is testing the launcher itself), which install a pinned
      # Deno version by default. The token is read-only and no secrets are
      # present, so the residual risk of the bootstrap is low.
      - name: Run tests with the bash launcher
        if: runner.os != 'Windows'
        run: ./zuke test
        env:
          DENO_VERSION: v2.8.3

      - name: Run tests with the PowerShell launcher
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./zuke.ps1 test

  coverage:
    name: Coverage → Codecov
    runs-on: ubuntu-latest
    # Deliberately isolated from the `quality` job: this is the only job that
    # carries the Codecov upload token, and it holds no write-scoped token and
    # no provider keys. Keeping the third-party uploader (and its Codecov/GCS/
    # PyPI egress) out of the privileged job preserves that job's minimal,
    # locked-down surface. The trade-off is a second test run to produce the
    # coverage report — acceptable, and consistent with the cross-OS matrix.
    permissions:
      contents: read
    steps:
      # Egress allowlist: Deno bootstrap (deno.land + the release CDN), module
      # resolution (jsr.io), installing the Codecov CLI from PyPI, and the
      # Codecov upload itself (its API plus the GCS bucket it streams reports
      # to). Add a host here if a run reports it blocked.
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            deno.land:443
            dl.deno.land:443
            jsr.io:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            api.codecov.io:443
            ingest.codecov.io:443
            cli.codecov.io:443
            storage.googleapis.com:443
            keybase.io:443

      # Full history so the Codecov CLI can resolve the commit and its parents.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      # The Codecov CLI ships as the `codecov-cli` PyPI package (the `codecovcli`
      # binary the @zuke/codecov wrapper invokes). pipx is preinstalled on the
      # GitHub Ubuntu runner.
      - name: Install the Codecov CLI
        run: pipx install codecov-cli

      # `coverageUpload` depends on `coverage`, so this produces cov.lcov (via
      # the test run + gate) and then uploads it. CODECOV_TOKEN rides through the
      # environment — never argv. On a fork PR the secret is absent and the
      # target skips the upload instead of failing.
      - name: Produce coverage and upload to Codecov
        run: ./zuke coverageUpload
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
