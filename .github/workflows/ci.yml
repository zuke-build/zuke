name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Least privilege: CI only ever needs to read the repo. No secrets are used.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build & verify with Zuke
    runs-on: ubuntu-latest
    steps:
      # Audit (and optionally block) outbound network from the runner, so a
      # compromised dependency can't exfiltrate or reach an unexpected host.
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      # Pin Deno to a known version rather than letting the launcher fetch and
      # execute an unpinned remote install script in CI (supply-chain hardening).
      - name: Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: "2.8.3"

      - name: Run the full gate with Zuke
        run: ./zuke ci

  test-os:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      # This job deliberately exercises the user-facing bootstrap launchers
      # (the value here is testing the launcher itself). The token is read-only
      # and no secrets are present, so the residual risk of the bootstrap is
      # low; DENO_VERSION pins the version it installs.
      - name: Run tests with the bash launcher
        if: runner.os != 'Windows'
        run: ./zuke test
        env:
          DENO_VERSION: v2.8.3

      - name: Run tests with the PowerShell launcher
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./zuke.ps1 test
