name: CI

on:
  # Run once per change: `pull_request` covers every PR branch, and `push`
  # covers the post-merge commit on the default branch. Triggering `push` on
  # all branches as well would double every PR run (a `push` and a
  # `pull_request` job for the same commit) for no extra signal.
  push:
    branches: [master]
  pull_request:

# Default to read-only; the quality job opts into pull-requests:write below for
# the lint self-healing comment. The cross-OS test job stays secret-free.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build & verify with Zuke
    runs-on: ubuntu-latest
    # Read the repo, and comment on the PR for the lint self-healing fixer. The
    # OpenAI key is a same-repo secret, so on fork PRs it is absent and the fixer
    # simply skips — CI still runs read-only.
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Audit (and optionally block) outbound network from the runner, so a
      # compromised dependency can't exfiltrate or reach an unexpected host.
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # No "set up Deno" step: the ./zuke launcher bootstraps Deno, pinned to a
      # known version by default (override with DENO_VERSION). Running through
      # the launcher keeps CI exercising the same entry point everyone else uses.
      #
      # OPENAI_API_KEY powers the lint target's self-healing fixer: on a lint
      # failure it posts the diagnosis (and an inline suggestion) to the PR. The
      # key is optional — without it the fixer skips and lint just fails. The
      # fixer fetches the PR base branch itself for diff context (no manual step).
      - name: Run the full gate with Zuke
        run: ./zuke ci
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-os:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # This job deliberately exercises the user-facing bootstrap launchers
      # (the value here is testing the launcher itself), which install a pinned
      # Deno version by default. The token is read-only and no secrets are
      # present, so the residual risk of the bootstrap is low.
      - name: Run tests with the bash launcher
        if: runner.os != 'Windows'
        run: ./zuke test
        env:
          DENO_VERSION: v2.8.3

      - name: Run tests with the PowerShell launcher
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./zuke.ps1 test
